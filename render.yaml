services:
  # Backend Web Service
  - type: web
    name: apex-horizons-api
    env: node
    plan: free
    region: singapore
    rootContext: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: apex-horizons-db
          property: connectionString

  # Frontend Static Site
  - type: static
    name: apex-horizons-web
    env: static
    plan: free
    region: singapore
    rootContext: client
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: apex-horizons-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: apex-horizons-db
    plan: free
    region: singapore
