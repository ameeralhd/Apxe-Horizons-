services:
  # Backend Web Service
  - type: web
    name: apex-horizons-api
    env: node
    plan: free
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: apex-horizons-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        value: 608132465176-igsovdtn4bkc8qt6up0ik8s540qqb9cl.apps.googleusercontent.com

  # Frontend Static Site
  - type: web
    name: apex-horizons-web
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://apex-horizons-api.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 608132465176-igsovdtn4bkc8qt6up0ik8s540qqb9cl.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: apex-horizons-db
    plan: free
    region: singapore
